<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simulador de Carga - Base Técnica (CEMIG)</title>

    <!-- Chart.js para plot da curva -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      :root {
        --cemig-blue: #008000;
        --cemig-accent: #008000;
        --black: #000000;
        --muted: #000000;
        --bg: #f4f7fb;
        --card: #ffffff;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: #122028;
      }
      .header {
        background: linear-gradient(
          90deg,
          var(--cemig-blue),
          var(--cemig-accent)
        );
        color: #fff;
        padding: 16px 22px;
        font-weight: 700;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      }
      .wrap {
        max-width: 1100px;
        margin: 20px auto;
        padding: 18px;
      }
      .card {
        background: var(--card);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 18px;
        box-shadow: 0 6px 18px rgba(2, 6, 23, 0.06);
      }
      h2 {
        margin: 10 0 8px;
        font-size: 18px;
        color: var(--black);
      }
      p.lead {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
        align-items: start;
      }

      /* Linha Qtd | Disjuntor (aparece como um row) */
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .row .qtd {
        width: 100px;
      }
      .row .dq {
        flex: 1;
      }

      label {
        font-size: 13px;
        color: #000000;
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input[type="number"],
      input[type="text"],
      select,
      textarea {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #000000;
        background: #ffffff;
        font-size: 14px;
        color: #000000;
        box-sizing: border-box;
      }
      .small {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      button {
        background: var(--cemig-blue);
        color: #fff;
        padding: 10px 14px;
        border-radius: 8px;
        border: 0;
        cursor: pointer;
        font-weight: 700;
        box-shadow: 0 6px 18px lab(33.8% 21.3 -58.01 / 0.12);
      }
      button.secondary {
        background: var(--cemig-blue);
        color: var(#fff);
        box-shadow: none;
        border: 1px solid var(--cemig-blue);
      }
      .result {
        white-space: pre-line;
        background: linear-gradient(180deg, #fff, #fff);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #000000;
        margin-top: 12px;
        color: #000000;
      }
      .two-col {
        display: grid;
        grid-template-columns: 1fr 700px;
        gap: 18px;
      }
      canvas {
        background: #fff;
        border-radius: 8px;
        padding: 8px;
      }
      .muted-note {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      footer {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        padding: 12px 0;
      }
      @media (max-width: 900px) {
        .two-col {
          grid-template-columns: 1fr;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .row .qtd {
          width: 86px;
        }
      }
      .three-col {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr; /* três colunas */
        gap: 18px;
      }

      @media (max-width: 1200px) {
        .three-col {
          grid-template-columns: 1fr 1fr; /* duas colunas em telas médias */
        }
      }

      @media (max-width: 900px) {
        .three-col {
          grid-template-columns: 1fr; /* uma coluna em telas pequenas */
        }
      }
    </style>
  </head>

    <div class="header">Simulador de Carga — Base Técnica (CEMIG)</div>

    <div class="wrap">
      <!-- Top - Transformador / Meta -->
      <div class="card">
        <h2>Dados do Transformador</h2>
        <p class="lead">Informe dados do transformador.</p>

        <div class="three-col" style="margin-top: 4px">
          <div>
            <label>Transformador</label>
            <input id="trafo" type="text" />
            <label style="margin-top: 30px">Demanda residencial</label>
            <input id="demResTot" type="number" value="" step="0.01" />
            <label>Demanda comercial</label>
            <input id="demComTot" type="number" value="" step="0.01" />
            <label>Demanda industrial</label>
            <input id="demi" type="number" value="" step="0.01" />
            <label>Demanda rural</label>
            <input id="ip_val" type="number" value="" step="0.01" />
            <label>Demanda outros</label>
            <input id="ip_val" type="number" value="" step="0.01" />
            <label>Demanda Iluminação Pública</label>
            <input id="ip_val" type="number" value="" step="0.01" />
          </div>

          <div>
            <label> Potência do transformador (kVA)</label>
            <input id="pottr" type="number" value="" step="1" readonly />
            <label style="margin-top: 30px"
              >Quantidade de consumidores residenciais existentes</label
            >
            <input id="quantiResTot" type="number" value="" />
            <label>Quantidade de consumidores comerciais existentes</label>
            <input id="quantComTot" type="number" value="" />
            <label>Quantidade de consumidores industriais existentes</label>
            <input id="numcsi" type="number" value="" />
            <label>Quantidade de consumidores rurais existentes</label>
            <input id="quantComTot" type="number" value="" />
            <label>Quantidade de consumidores outros existentes</label>
            <input id="numcsi" type="number" value="" />
          </div>

          <div>
            <label>Tipo de Transformador</label>
            <select id="tipo_TRF">
              <option value="">Convencional</option>
              <option value="1">Autoprotegido</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Local de atendimento</h2>
        <div class="three-col"></div>
        <div>
          <label style="margin-top: 10px">Zona</label>
          <select id="zona">
            <option value="urbana">Área Urbana</option>
            <option value="rural">Área Rural</option>
          </select>
        </div>
        <div>
          <label style="margin-top: 10px">Município</label>
          <select id="municipio">
            <option value=""></option>
          </select>
        </div>
      </div>

      <!-- Consumidores: Residencial / Comercial / Industrial -->
      <div class="card">
        <h2>Novos Consumidores</h2>
        <div class="three-col">
          <div>
            <label>Quantidade</label>
            <input id="qtd_geral" type="number" value="" min="0" />
          </div>
          <div>
            <label>Disjuntor Geral</label>
            <select id="disj_geral"></select>
          </div>
        </div>
        <div class="three-col">
          <div>
            <h3 style="color: var(--black); margin: 10 0 8px">Residencial</h3>
            <div style="margin-top: 10px">
              <div class="row">
                <div>
                  <label>Quantidade</label>
                  <input class="qtd" id="res1" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <label>Disjuntor</label>
                  <select id="dres1"></select>
                </div>
              </div>

              <div class="row" style="margin-top: 2px">
                <div>
                  <input class="qtd" id="res2" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <select id="dres2"></select>
                </div>
              </div>

              <div class="row" style="margin-top: 2px">
                <div>
                  <input class="qtd" id="res3" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <select id="dres3"></select>
                </div>
              </div>
            </div>
          </div>
          <div>
            <h3 style="color: var(--black); margin: 10 0 8px">Comercial</h3>
            <div style="margin-top: 10px">
              <div class="row">
                <div>
                  <label>Quantidade</label>
                  <input class="qtd" id="com1" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <label>Disjuntor</label>
                  <select id="dcom1"></select>
                </div>
              </div>

              <div class="row" style="margin-top: 2px">
                <div>
                  <input class="qtd" id="com2" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <select id="dcom2"></select>
                </div>
              </div>

              <div class="row" style="margin-top: 2px">
                <div>
                  <input class="qtd" id="com3" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <select id="dcom3"></select>
                </div>
              </div>
            </div>
          </div>
          <div>
            <h3 style="color: var(--black); margin: 10 0 8px">Industrial</h3>
            <div style="margin-top: 10px">
              <div class="row">
                <div>
                  <label>Quantidade</label>
                  <input class="qtd" id="ind1" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <label>Disjuntor</label>
                  <select id="dind1"></select>
                </div>
              </div>

              <div class="row" style="margin-top: 2px">
                <div>
                  <input class="qtd" id="ind2" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <select id="dind2"></select>
                </div>
              </div>

              <div class="row" style="margin-top: 2px">
                <div>
                  <input class="qtd" id="ind3" type="number" value="" min="0" />
                </div>
                <div class="dq">
                  <select id="dind3"></select>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Ajustes e Botões -->
      <div class="card">
        <h2>Parâmetros & Ações</h2>
        <div class="actions">
          <button id="btnCalc">Calcular</button>
          <button id="btnReset" class="secondary">Limpar</button>
        </div>
        
      </div>

      <!-- Gráfico e resumo -->
<div class="card">

  <div class="two-col">
    <div id="msg" class="result" style="margin-top: 12px"></div>
    <div>
      <canvas id="chart" height="200"></canvas>
    </div>
  </div>
</div>



      <footer>Simulador de Carga CEMIG - PE/EM</footer>

      /* get_fator_diversidadeR (residencial) */
      function get_fator_diversidadeR(indice_disjuntor, quantidade) {
        let idx = Math.max(1, Math.min(parseInt(indice_disjuntor) || 0, 40));
        if (1 <= idx && idx <= 13) {
          const max_chave = Math.max(
            ...Object.keys(fatorA_by_n).map((x) => +x),
          );
          const chave = Math.min(quantidade, max_chave);
          return parseFloat(fatorA_by_n[chave] ?? fatorA_by_n[max_chave]);
        } else {
          const max_chave = Math.max(
            ...Object.keys(fatorB_by_n).map((x) => +x),
          );
          let chave =
            quantidade === 1
              ? quantidade
              : Math.max(1, Math.floor(quantidade / 2));
          chave = Math.min(chave, max_chave);
          return parseFloat(fatorB_by_n[chave] ?? fatorB_by_n[max_chave]);
        }
      }

      /* monta seleção rápida para texto_disjuntores */
      function formatTextoDisjuntores(pares) {
        let texto = "";
        const tipos = [
          "Disjuntor Residencial",
          "Disjuntor Comercial",
          "Disjuntor Industrial",
        ];
        for (let i = 0; i < 9; i++) {
          const [qtd, disj] = pares[i] || [0, ""];
          if (!qtd || !disj) continue;
          let tipo = i < 3 ? tipos[0] : i < 6 ? tipos[1] : tipos[2];
          texto += `${tipo}: ${qtd} x ${disj}\n`;
        }
        const [qtdg, disjg] = pares[9] || [0, ""];
        if (qtdg && disjg) texto += `\nDisjuntor Geral: ${qtdg} x ${disjg}\n`;
        return texto;
      }

          parseInt(document.getElementById("tipo_TRF").value) || 0;
        const trafo = (document.getElementById("trafo").value || "").trim();
        const zona = document.getElementById("zona").value;

        function verificarLimite(municipio, zona) {
          municipio = municipio.trim();

          if (CIDADE_100_25.includes(municipio) && zona === "rural") {
            return { trifasico: 100, monofasico: 25 };
          }

          if (CIDADE_50_50.includes(municipio) && zona === "rural") {
            return { trifasico: 50, monofasico: 50 };
          }

          // demais casos (urbano ou rural)
          return { trifasico: 100, monofasico: 50 };
        }

        // exemplo de uso
        const lim_manual = document
          .getElementById("municipio")
          .addEventListener("change", function () {
            const municipio = this.value;
            const zona = document.getElementById("zona").value; // supondo que exista um select para zona
            const limites = verificarLimite(municipio, zona);
          });

        // quantidades e nomes
        const res1 = parseInt(document.getElementById("res1").value) || 0;
        const res2 = parseInt(document.getElementById("res2").value) || 0;
        const res3 = parseInt(document.getElementById("res3").value) || 0;

        const com1 = parseInt(document.getElementById("com1").value) || 0;
        const com2 = parseInt(document.getElementById("com2").value) || 0;
        const com3 = parseInt(document.getElementById("com3").value) || 0;

        const ind1 = parseInt(document.getElementById("ind1").value) || 0;
        const ind2 = parseInt(document.getElementById("ind2").value) || 0;
        const ind3 = parseInt(document.getElementById("ind3").value) || 0;

        const dres1 = document.getElementById("dres1").value || "";
        const dres2 = document.getElementById("dres2").value || "";
        const dres3 = document.getElementById("dres3").value || "";

        const dcom1 = document.getElementById("dcom1").value || "";
        const dcom2 = document.getElementById("dcom2").value || "";
        const dcom3 = document.getElementById("dcom3").value || "";

        const dind1 = document.getElementById("dind1").value || "";
        const dind2 = document.getElementById("dind2").value || "";
        const dind3 = document.getElementById("dind3").value || "";

        const qtd_geral =
          parseInt(document.getElementById("qtd_geral").value) || 0;
        const disj_geral = document.getElementById("disj_geral").value || "";

        const quantiResTot =
          parseInt(document.getElementById("quantiResTot").value) || 0;
        const quantComTot =
          parseInt(document.getElementById("quantComTot").value) || 0;
        const numcsi = parseInt(document.getElementById("numcsi").value) || 0;

        let demResTot =
          parseFloat(document.getElementById("demResTot").value) || 0;
        let demComTot =
          parseFloat(document.getElementById("demComTot").value) || 0;
        let demi = parseFloat(document.getElementById("demi").value) || 0;

        const ip_val = parseFloat(document.getElementById("ip_val").value) || 0;

        // quantidade total de disjuntores (igual ao Python)
        const quantidadeDisjuntores =
          res1 +
          res2 +
          res3 +
          com1 +
          com2 +
          com3 +
          ind1 +
          ind2 +
          ind3 +
          quantiResTot +
          numcsi +
          quantComTot;

        // lookup por nome -> (idx, kva)
        const lookup = {};
        DISJUNTORES.forEach((d) => {
          lookup[d[0]] = { idx: d[1], kva: d[2] };
        });

        // auxiliar para obter idx/kva seguros
        function getEntry(name) {
          if (!name) return { idx: 0, kva: 0.0 };
          return lookup[name] || { idx: 0, kva: 0.0 };
        }

        // fatores por disjuntor (res/com/ind)
        const ires1 = getEntry(dres1).idx;
        const ires2 = getEntry(dres2).idx;
        const ires3 = getEntry(dres3).idx;
        const icom1 = getEntry(dcom1).idx;
        const icom2 = getEntry(dcom2).idx;
        const icom3 = getEntry(dcom3).idx;
        const iind1 = getEntry(dind1).idx;
        const iind2 = getEntry(dind2).idx;
        const iind3 = getEntry(dind3).idx;

        const fator_res1 = get_fator_diversidadeR(ires1, quantidadeDisjuntores);
        const fator_res2 = get_fator_diversidadeR(ires2, quantidadeDisjuntores);
        const fator_res3 = get_fator_diversidadeR(ires3, quantidadeDisjuntores);
        const fator_com1 = get_fator_diversidade(icom1, quantidadeDisjuntores);
        const fator_com2 = get_fator_diversidade(icom2, quantidadeDisjuntores);
        const fator_com3 = get_fator_diversidade(icom3, quantidadeDisjuntores);
        const fator_ind1 = get_fator_diversidade(iind1, quantidadeDisjuntores);
        const fator_ind2 = get_fator_diversidade(iind2, quantidadeDisjuntores);
        const fator_ind3 = get_fator_diversidade(iind3, quantidadeDisjuntores);

        // kva por disjuntor e regra idx>=12 multiplicativa (mesma que você pediu)
        const e_res1 = getEntry(dres1);
        const e_res2 = getEntry(dres2);
        const e_res3 = getEntry(dres3);
        const e_com1 = getEntry(dcom1);
        const e_com2 = getEntry(dcom2);
        const e_com3 = getEntry(dcom3);
        const e_ind1 = getEntry(dind1);
        const e_ind2 = getEntry(dind2);
        const e_ind3 = getEntry(dind3);

        const kva_res1 = e_res1.idx >= 12 ? e_res1.kva * res1 : e_res1.kva;
        const kva_res2 = e_res2.idx >= 12 ? e_res2.kva * res2 : e_res2.kva;
        const kva_res3 = e_res3.idx >= 12 ? e_res3.kva * res3 : e_res3.kva;

        const kva_com1 = e_com1.idx >= 12 ? e_com1.kva * com1 : e_com1.kva;
        const kva_com2 = e_com2.idx >= 12 ? e_com2.kva * com2 : e_com2.kva;
        const kva_com3 = e_com3.idx >= 12 ? e_com3.kva * com3 : e_com3.kva;

        const kva_ind1 = e_ind1.idx >= 12 ? e_ind1.kva * ind1 : e_ind1.kva;
        const kva_ind2 = e_ind2.idx >= 12 ? e_ind2.kva * ind2 : e_ind2.kva;
        const kva_ind3 = e_ind3.idx >= 12 ? e_ind3.kva * ind3 : e_ind3.kva;

        // demanda simulada por tipo (usa fatores)
        const dem_simulada_res1 = fator_res1 * kva_res1 * 1; // a multiplicação por qtd já aplicada em kva_res1 conforme regra
        const dem_simulada_res2 = fator_res2 * kva_res2 * 1;
        const dem_simulada_res3 = fator_res3 * kva_res3 * 1;

        const dem_simulada_com1 = fator_com1 * kva_com1 * 1;
        const dem_simulada_com2 = fator_com2 * kva_com2 * 1;
        const dem_simulada_com3 = fator_com3 * kva_com3 * 1;

        const dem_simulada_ind1 = fator_ind1 * kva_ind1 * 1;
        const dem_simulada_ind2 = fator_ind2 * kva_ind2 * 1;
        const dem_simulada_ind3 = fator_ind3 * kva_ind3 * 1;

        // ajusta agregados (igual ao seu Python)
        demComTot = demComTot / 0.82;
        demi = demi / 0.55;

        // somas finais com multiplicadores 0.6/0.8/0.9 (idem Python)
        const dem_simulada_residencial =
          (dem_simulada_res1 + dem_simulada_res2 + dem_simulada_res3) * 0.6 +
          (demResTot || 0);
        const dem_simulada_comercial =
          (dem_simulada_com1 + dem_simulada_com2 + dem_simulada_com3) * 0.8 +
          (demComTot || 0);
        const dem_simulada_industrial =
          (dem_simulada_ind1 + dem_simulada_ind2 + dem_simulada_ind3) * 0.9 +
          (demi || 0);

        const demTOT =
          dem_simulada_residencial +
          dem_simulada_comercial +
          dem_simulada_industrial +
          (ip_val || 0);

        // curva horária (mesma multiplicação que Python - aplica perfis)
        const curvares =
          (dem_simulada_res1 +
            dem_simulada_res2 +
            dem_simulada_res3 +
            (demResTot || 0)) *
          consumidorRes;
        const curvaCom =
          (dem_simulada_com1 +
            dem_simulada_com2 +
            dem_simulada_com3 +
            (demComTot || 0)) *
          consumidorComerc;
        const curvaInd =
          (dem_simulada_ind1 +
            dem_simulada_ind2 +
            dem_simulada_ind3 +
            (demi || 0)) *
          consumidorIndustrial;

        const curva_simulada = [];
        for (let i = 0; i < Hora.length; i++) {
          const v =
            (curvares[i] || 0) + (curvaCom[i] || 0) + (curvaInd[i] || 0);
          curva_simulada.push(v);
        }

        // limite transformador
        let mult = tipo_TRF === 0 ? 1.5 : 0.9;
        const label_pct = tipo_TRF === 0 ? "150%" : "90%";
        const limite = pottr * mult;

        // pico
        const pico_total = Math.max(...curva_simulada);
        const hora_pico = Hora[curva_simulada.indexOf(pico_total)];

        // verificar limite municipal (usando lim_manual se presente)
        let lim_Municipio;
        if (!isNaN(lim_manual) && lim_manual > 0) {
          lim_Municipio = lim_manual;
        } else {
          // simples default (o usuário optou por inserir lista depois)
          lim_Municipio = zona === "urbana" ? 100 : 50;
        }

        // construir pares para texto (igual ao Python)
        const pares = [
          [res1, dres1],
          [res2, dres2],
          [res3, dres3],
          [com1, dcom1],
          [com2, dcom2],
          [com3, dcom3],
          [ind1, dind1],
          [ind2, dind2],
          [ind3, dind3],
          [qtd_geral, disj_geral],
        ];

        // kva selecionados (para checar municipal)
        const kva_selecionados = [];
        for (const [qtd, disj] of pares) {
          if (!disj || disj === "") continue;
          const entry = getEntry(disj);
          if (!entry || entry.idx === 0) continue;
          const idx = entry.idx;
          const kva_base = entry.kva;
          const kva_valor = idx >= 12 ? kva_base * (qtd || 0) : kva_base;
          kva_selecionados.push({ nome: disj, kva: kva_valor });
        }

        // decisão (mesma hierarquia que Python)
        let textoCab = "";
        const criarMedidas = {
          carregamento: false,
          planejamento: false,
          liberacao: false,
        };
        if (pico_total > limite) {
          textoCab =
            "Carregamento máximo suportado pelo transformador excedido.\nPara este atendimento será necessário obra de reforço na rede.\n**********************************************";
          criarMedidas.carregamento = true;
        } else if (kva_selecionados.some((k) => k.kva > lim_Municipio)) {
          textoCab =
            "Necessário análise pela equipe de planejamento.\n**********************************************";
          criarMedidas.planejamento = true;
        } else {
          textoCab =
            "Rede liberada para conexão.\nNão será necessário obra de reforço na rede.\n**********************************************";
          criarMedidas.liberacao = true;
        }

        // texto_disjuntores formatado
        const texto_disjuntores = formatTextoDisjuntores(pares);

        // texto resultado (parecido com sua versão)
        const texto_resultado = `${textoCab}
Pico de demanda: ${pico_total.toFixed(2)} kVA às ${hora_pico}
Demanda simulada: ${demTOT.toFixed(2)} kVA
Transformador: ${trafo || "(não informado)"} (${tipo_TRF === 0 ? "CONVENCIONAL" : "AUTOPROTEGIDO"}) [Limite ${label_pct} = ${limite.toFixed(1)} kVA]
${texto_disjuntores}
Coordenada: `;

        // atualizar UI
        document.getElementById("msg").innerText = texto_resultado;

        // plot
        plotCurve(
          Hora,
          curva_simulada.map((v) => +v.toFixed(2)),
          limite,
        );

        // salvar metadados ocultos (se quiser estender)
        window._lastCalc = {
          texto_resultado,
          pico_total,
          hora_pico,
          demTOT,
          criarMedidas,
          kva_selecionados,
          limite,
          lim_Municipio,
        };
      }

      /* util escape HTML */
      function escapeHtml(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
    </script>
  </body>
