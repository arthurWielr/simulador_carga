<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simulador de Carga - CEMIG</title>

    <!-- Chart.js para plot da curva -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      :root {
        --cemig-blue: #008000;
        --cemig-accent: #008000;
        --black: #000000;
        --muted: #000000;
        --bg: #faf4fb;
        --card: #ffffff;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 20px;
        background: var(--bg);
        color: #122028;
      }

      .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 98%;
        height: 50px; /* aumente um pouco a altura */
        background: linear-gradient(
          90deg,
          var(--cemig-blue),
          var(--cemig-accent)
        );
        color: #fff;
        font-weight: 700;
        display: flex;
        align-items: center; /* centraliza verticalmente */
        justify-content: space-between;
        padding: 0 22px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        z-index: 1000;
      }

      .header img {
        max-height: 90%; /* ocupa até 70% da altura do header */
        height: auto; /* mantém proporção */
        width: auto; /* mantém proporção */
      }

      .wrap {
        max-width: 1100px;
        margin: 20px auto;
        padding: 18px;
      }

      .page-layout {
        display: grid;
        grid-template-columns: 1fr 700px;
        gap: 10px;
        align-items: start;
        padding-top: 22px;
        padding-left: 165px;
        padding-right: 10px;
      }

      .card {
        background: var(--card);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 18px;
        box-shadow: 0 6px 18px rgba(2, 6, 23, 0.06);
      }
      h2 {
        margin: 10 0 8px;
        font-size: 18px;
        color: var(--black);
      }
      p.lead {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
        align-items: start;
      }

      .sidebar {
        position: sticky;
        top: 60px;
        align-self: start;
        height: fit-content;
      }

      /* Linha Qtd | Disjuntor (aparece como um row) */
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .row .qtd {
        width: 100px;
      }
      .row .dq {
        flex: 1;
      }

      label {
        font-size: 13px;
        color: #000000;
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input[type="number"],
      input[type="text"],
      select,
      textarea {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #000000;
        background: #ffffff;
        font-size: 12px;
        color: #000000;
        box-sizing: border-box;
      }
      .small {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      button {
        background: var(--cemig-blue);
        color: #fff;
        padding: 10px 14px;
        border-radius: 8px;
        border: 0;
        cursor: pointer;
        font-weight: 700;
        box-shadow: 0 6px 18px lab(33.8% 21.3 -58.01 / 0.12);
      }
      button.secondary {
        background: var(--cemig-blue);
        color: var(#fff);
        box-shadow: none;
        border: 1px solid var(--cemig-blue);
      }
      .result {
        white-space: pre-line;
        background: linear-gradient(180deg, #fff, #fff);
        padding: 14px;
        border-radius: 8px;
        border: 1px solid #000000;
        margin-top: 12px;
        color: #000000;
        font-size: 12px;
      }
      .two-col {
        display: grid;
        grid-template-columns: 1fr 700px;
        gap: 18px;
      }
      canvas {
        background: #fff;
        border-radius: 8px;
        padding: 8px;
      }
      .muted-note {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      footer {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        padding: 12px 0;
      }
      #fixed-actions {
        position: fixed;
        top: 60px;
        left: 18px;
        z-index: 1100;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #fixed-actions button {
        width: 130px;
        padding: 10px 14px;
        font-size: 13px;
      }
      #fixed-actions button:disabled {
        background: #a0bfa0;
        cursor: not-allowed;
        box-shadow: none;
        opacity: 0.65;
      }
      @media (max-width: 900px) {
        .two-col {
          grid-template-columns: 1fr;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .row .qtd {
          width: 86px;
        }
      }
      .three-col {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr; /* três colunas */
        gap: 18px;
      }

      @media (max-width: 1200px) {
        .three-col {
          grid-template-columns: 1fr 1fr; /* duas colunas em telas médias */
        }
      }

      @media (max-width: 900px) {
        .three-col {
          grid-template-columns: 1fr; /* uma coluna em telas pequenas */
        }
      }
    </style>
  </head>

      Simulador de Carga

    </div>

                value=""

              />
              <label>Demanda comercial</label>

                type="number"
                value=""
                step="0.01"
              />
              <label>Demanda industrial</label>
              <input

                value=""

              />

              <label>Demanda outros</label>
              <input id="demanda_outros" type="number" value="" step="0.01" />
              <label>Demanda Iluminação Pública</label>
              <input
                id="demanda_iluminação"
                type="number"
                value=""
                step="0.01"
              />
            </div>

            <div>
              <label> Potência do transformador (kVA)</label>
              <input id="pottr" type="number" value="" step="1" readonly />
              <label style="margin-top: 30px"

              <input id="uc_residencial" type="number" value="" />
              <label>Quantidade de consumidores comerciais existentes</label>
              <input id="uc_comercial" type="number" value="" />
              <label>Quantidade de consumidores industriais existentes</label>
              <input id="uc_industrial" type="number" value="" />
              <label>Quantidade de consumidores rurais existentes</label>
              <input id="uc_rural" type="number" value="" />
              <label>Quantidade de consumidores outros existentes</label>
              <input id="uc_outros" type="number" value="" />
            </div>

            <div>
              <label>Tipo de Transformador</label>
              <select id="tipo_TRF">
                <option value="">Convencional</option>
                <option value="1">Autoprotegido</option>
              </select>
            </div>
          </div>
        </div>

            quantidade === 1

              : Math.max(1, Math.floor(quantidade / 2));
          chave = Math.min(chave, max_chave);
          return parseFloat(fatorB_by_n[chave] ?? fatorB_by_n[max_chave]);
        }
      }

      /* monta seleção rápida para texto_disjuntores */
      function formatTextoDisjuntores(pares) {
        let texto = "";
        const tipos = [
          "Disjuntor Residencial",
          "Disjuntor Comercial",
          "Disjuntor Industrial",
        ];
        const [qtdg, disjg] = pares[9] || [0, ""];
        if (qtdg && disjg) texto += `Disjuntor Geral: ${qtdg} x ${disjg}\n`;
        for (let i = 0; i < 9; i++) {
          const [qtd, disj] = pares[i] || [0, ""];
          if (!qtd || !disj) continue;
          let tipo = i < 3 ? tipos[0] : i < 6 ? tipos[1] : tipos[2];
          texto += `${tipo}: ${qtd} x ${disj}\n`;
        }
        return texto;
      }

      // --- 1) Função para obter fator de diversidade (retorna [factor, key])
      function get_fator_diversidade(idx, total_customers, consumer_class) {
        // construir dicionários a partir de fator_diversidade (assumindo que existe array fator_diversidade)
        const factorA_by_n = {};
        const factorB_by_n = {};
        for (const [n, a, b] of fator_diversidade) {
          factorA_by_n[n] = a;
          factorB_by_n[n] = b;
        }

        const klass = (consumer_class || "").toString().trim().toLowerCase();
        let useA;
        if (
          klass === "residencial" ||
          klass === "residential" ||
          klass === "rural"
        ) {
          useA = idx >= 1 && idx <= 13;
        } else {
          useA = idx >= 1 && idx <= 9;
        }

        if (useA) {
          const maxKey = Math.max(...Object.keys(factorA_by_n).map(Number));
          const key = Math.min(
            Math.max(1, parseInt(total_customers) || 1),
            maxKey,
          );
          const factor =
            factorA_by_n[key] !== undefined
              ? factorA_by_n[key]
              : factorA_by_n[maxKey];
          return [parseFloat(factor), key];
        } else {
          const maxKey = Math.max(...Object.keys(factorB_by_n).map(Number));
          const n = Math.max(1, parseInt(total_customers) || 1);
          let key = n === 1 ? 1 : Math.max(1, Math.floor(n / 2));
          key = Math.min(key, maxKey);
          const factor =
            factorB_by_n[key] !== undefined
              ? factorB_by_n[key]
              : factorB_by_n[maxKey];
          return [parseFloat(factor), key];
        }
      }

      // --- 2) Corrigir leitura do limite municipal manual (não atribuir addEventListener ao lim_manual)
      document
        .getElementById("municipio")
        .addEventListener("change", function () {
          // apenas atualiza UI/estado; não sobrescreve lim_manual global
          // se quiser recalcular automaticamente, chame calcular() aqui
          // calcular();
        });

      // obter valor manual (se existir) no momento do cálculo
      const lim_manual_input = document.getElementById("lim_manual"); // supondo que exista um input com id lim_manual
      const lim_manual_val = lim_manual_input
        ? parseFloat(lim_manual_input.value)
        : NaN;

      const lookup = {};
      DISJUNTORES.forEach((d) => {
        lookup[d[0]] = { idx: d[1], kva: d[2] };
      });
      function getEntry(name) {
        if (!name) return { idx: 0, kva: 0.0 };
        return lookup[name] || { idx: 0, kva: 0.0 };
      }

      function computeItemDemand(
        amount,
        breakerName,
        consumerClass,
        total_customers,
      ) {
        const entry = getEntry(breakerName);
        const idx = entry.idx || 0;
        const base_kva = entry.kva || 0.0;
        const amountInt = parseInt(amount) || 0;

        // regra: se idx >= 12, kVA escala pela quantidade; senão, usa unitário
        const kva_value = idx >= 12 ? base_kva * amountInt : base_kva;

        // obter fator e chave
        const [factor, div_key] = get_fator_diversidade(
          idx,
          total_customers,
          consumerClass,
        );

        // multiplicador por classe (dummy_factor)
        let dummy_factor = 0.9;
        const klass = (consumerClass || "").toString().trim().toLowerCase();
        if (
          klass === "residencial" ||
          klass === "residential" ||
          klass === "rural"
        ) {
          dummy_factor = 0.6;
        } else if (
          klass === "comercial" ||
          klass === "comercial".toLowerCase()
        ) {
          dummy_factor = 0.8;
        } else {
          dummy_factor = 0.9;
        }

        const demand_kva = factor * kva_value * dummy_factor * amountInt;

        return {
          amount: amountInt,
          idx,
          base_kva,
          kva_value,
          factor,
          div_key,
          demand_kva,
        };
      }

      function calcular() {
        // ler inputs (seguindo nomes do Python)
        const pottr = parseFloat(document.getElementById("pottr").value) || 0;
        const tipo_TRF =
          parseInt(document.getElementById("tipo_TRF").value) || 0;
        const trafo = (document.getElementById("trafo").value || "").trim();
        const zona = document.getElementById("zona").value;

        function verificarLimite(municipio, zona) {
          municipio = municipio.trim();

          if (CIDADE_100_25.includes(municipio) && zona === "rural") {
            return { trifasico: 100, monofasico: 25 };
          }

          if (CIDADE_50_50.includes(municipio) && zona === "rural") {
            return { trifasico: 50, monofasico: 50 };
          }

          // demais casos (urbano ou rural)
          return { trifasico: 100, monofasico: 50 };
        }

        // exemplo de uso
        const lim_manual = document
          .getElementById("municipio")
          .addEventListener("change", function () {
            const municipio = this.value;
            const zona = document.getElementById("zona").value; // supondo que exista um select para zona
            const limites = verificarLimite(municipio, zona);
          });

        // quantidades e nomes
        const res1 = parseInt(document.getElementById("res1").value) || 0;
        const res2 = parseInt(document.getElementById("res2").value) || 0;
        const res3 = parseInt(document.getElementById("res3").value) || 0;

        const com1 = parseInt(document.getElementById("com1").value) || 0;
        const com2 = parseInt(document.getElementById("com2").value) || 0;
        const com3 = parseInt(document.getElementById("com3").value) || 0;

        const ind1 = parseInt(document.getElementById("ind1").value) || 0;
        const ind2 = parseInt(document.getElementById("ind2").value) || 0;
        const ind3 = parseInt(document.getElementById("ind3").value) || 0;

        const dres1 = document.getElementById("dres1").value || "";
        const dres2 = document.getElementById("dres2").value || "";
        const dres3 = document.getElementById("dres3").value || "";

        const dcom1 = document.getElementById("dcom1").value || "";
        const dcom2 = document.getElementById("dcom2").value || "";
        const dcom3 = document.getElementById("dcom3").value || "";

        const dind1 = document.getElementById("dind1").value || "";
        const dind2 = document.getElementById("dind2").value || "";
        const dind3 = document.getElementById("dind3").value || "";

        const qtd_geral =
          parseInt(document.getElementById("qtd_geral").value) || 0;
        const disj_geral = document.getElementById("disj_geral").value || "";

        const uc_residencial =
          parseInt(document.getElementById("uc_residencial").value) || 0;
        const uc_comercial =
          parseInt(document.getElementById("uc_comercial").value) || 0;
        const uc_industrial =
          parseInt(document.getElementById("uc_industrial").value) || 0;
        const uc_outros =
          parseInt(document.getElementById("uc_outros").value) || 0;
        const uc_rural =
          parseInt(document.getElementById("uc_rural").value) || 0;

        let demanda_residencial =
          parseFloat(document.getElementById("demanda_residencial").value) || 0;
        let demanda_comercial =
          parseFloat(document.getElementById("demanda_comercial").value) || 0;
        let demanda_industrial =
          parseFloat(document.getElementById("demanda_industrial").value) || 0;
        let demanda_rural =
          parseFloat(document.getElementById("demanda_rural").value) || 0;
        let demanda_outros =
          parseFloat(document.getElementById("demanda_outros").value) || 0;
        let demanda_iluminação =
          parseFloat(document.getElementById("demanda_iluminação").value) || 0;

        const total_customers =
          res1 +
          res2 +
          res3 +
          uc_residencial +
          uc_rural +
          com1 +
          com2 +
          com3 +
          uc_comercial +
          ind1 +
          ind2 +
          ind3 +
          uc_industrial +
          uc_outros;

        function safeCompute(a, b, tipo, total) {
          return a && b ? computeItemDemand(a, b, tipo, total) : null;
        }

        const r1 = safeCompute(res1, dres1, "residencial", total_customers);
        const r2 = safeCompute(res2, dres2, "residencial", total_customers);
        const r3 = safeCompute(res3, dres3, "residencial", total_customers);

        const c1 = safeCompute(com1, dcom1, "comercial", total_customers);
        const c2 = safeCompute(com2, dcom2, "comercial", total_customers);
        const c3 = safeCompute(com3, dcom3, "comercial", total_customers);

        const i1 = safeCompute(ind1, dind1, "industrial", total_customers);
        const i2 = safeCompute(ind2, dind2, "industrial", total_customers);
        const i3 = safeCompute(ind3, dind3, "industrial", total_customers);

        const dem_simulada_residencial =
          (r1?.demand_kva ?? 0) + (r2?.demand_kva ?? 0) + (r3?.demand_kva ?? 0);

        const dem_simulada_comercial =
          (c1?.demand_kva ?? 0) + (c2?.demand_kva ?? 0) + (c3?.demand_kva ?? 0);

        const dem_simulada_industrial =
          (i1?.demand_kva ?? 0) + (i2?.demand_kva ?? 0) + (i3?.demand_kva ?? 0);

        const curvaResTotal = consumidorRes.map(
          (v) =>
            v *
            (dem_simulada_residencial + demanda_residencial + demanda_rural),
        );
        const curvaComTotal = consumidorComerc.map(
          (v) =>
            v *
            (dem_simulada_comercial +
              demanda_comercial / 0.82 +
              demanda_outros / 0.82),
        );
        const curvaIndTotal = consumidorIndustrial.map(
          (v) => v * (dem_simulada_industrial + demanda_industrial / 0.55),
        );
        const curvaResAtual = consumidorRes.map(
          (v) => v * (demanda_residencial + demanda_rural),
        );
        const curvaComAtual = consumidorComerc.map(
          (v) => v * (demanda_comercial / 0.82 + demanda_outros / 0.82),
        );
        const curvaIndAtual = consumidorIndustrial.map(
          (v) => v * (demanda_industrial / 0.55),
        );
        const curva_ip = ip.map((v) => v * demanda_iluminação);

        const curvaTOT = curvaResTotal.map((v, i) => v + curvaComTotal[i] + curvaIndTotal[i] + curva_ip[i]);
        const curvaAtual = curvaResAtual.map((v, i) => v + curvaComAtual[i] + curvaIndAtual[i] + curva_ip[i]);

        const diff = curvaTOT.map((v, i) => v - curvaAtual[i]);

        const dem_simulada = Math.max(...diff);

        const demTOT =
          dem_simulada_residencial +
          dem_simulada_comercial +
          dem_simulada_industrial +
          (demanda_industrial || 0) +
          (demanda_comercial || 0) +
          (demanda_residencial || 0) +
          (demanda_outros || 0) +
          (demanda_rural || 0) +
          (demanda_iluminação || 0);

        const curva_simulada = [];
        for (let i = 0; i < Hora.length; i++) {
          const v =
            curvaResTotal[i] +
            curvaComTotal[i] +
            curvaIndTotal[i] +
            curva_ip[i];
          curva_simulada.push(v);
        }

        const curva_atual = [];
        for (let i = 0; i < Hora.length; i++) {
          const v =
            curvaResAtual[i] + curvaComAtual[i] + curvaIndAtual[i] + curva_ip[i];
          curva_atual.push(v);
        }

        // limite transformador
        let mult = tipo_TRF === 0 ? 1.5 : 0.9;
        const label_pct = tipo_TRF === 0 ? "150%" : "90%";
        const limite = pottr * mult;

        // pico
        const pico_total = Math.max(...curva_simulada);
        const hora_pico = Hora[curva_simulada.indexOf(pico_total)];

        // verificar limite municipal (usando lim_manual se presente)
        let lim_Municipio;
        if (!isNaN(lim_manual) && lim_manual > 0) {
          lim_Municipio = lim_manual;
        } else {
          // simples default (o usuário optou por inserir lista depois)
          lim_Municipio = zona === "urbana" ? 100 : 50;
        }

        // construir pares para texto (igual ao Python)
        const pares = [
          [res1, dres1],
          [res2, dres2],
          [res3, dres3],
          [com1, dcom1],
          [com2, dcom2],
          [com3, dcom3],
          [ind1, dind1],
          [ind2, dind2],
          [ind3, dind3],
          [qtd_geral, disj_geral],
        ];

        // kva selecionados (para checar municipal)
        const kva_selecionados = [];
        for (const [qtd, disj] of pares) {
          if (!disj || disj === "") continue;
          const entry = getEntry(disj);
          if (!entry || entry.idx === 0) continue;
          const idx = entry.idx;
          const kva_base = entry.kva;
          const kva_valor = idx >= 12 ? kva_base * (qtd || 0) : kva_base;
          kva_selecionados.push({ nome: disj, kva: kva_valor });
        }

        // decisão (mesma hierarquia que Python)
        let textoCab = "";
        const criarMedidas = {
          carregamento: false,
          planejamento: false,
          liberacao: false,
        };
        if (pico_total > limite) {
          textoCab =
            "Carregamento máximo suportado pelo transformador excedido.\nPara este atendimento será necessário obra de reforço na rede.\n**********************************************";
          criarMedidas.carregamento = true;
        } else if (kva_selecionados.some((k) => k.kva > lim_Municipio)) {
          textoCab =
            "Necessário análise pela equipe de planejamento.\n**********************************************";
          criarMedidas.planejamento = true;
        } else {
          textoCab =
            "Rede liberada para conexão.\n**********************************************";
          criarMedidas.liberacao = true;
        }

        // texto_disjuntores formatado
        const texto_disjuntores = formatTextoDisjuntores(pares);

        // texto resultado (parecido com sua versão)
        const texto_resultado = `${textoCab}
        Pico de demanda: ${pico_total.toFixed(2)} kVA às ${hora_pico}
        Demanda simulada: ${dem_simulada.toFixed(2)} kVA
        Transformador: ${trafo || "(não informado)"} (${tipo_TRF === 0 ? "Convencional" : "Autoprotegido"})
        ${texto_disjuntores}`;

        // atualizar UI
        document.getElementById("msg").innerText = texto_resultado;

        // plot
        plotCurve(
          Hora,
          curva_simulada.map((v) => +v.toFixed(2)),
          limite,
          curva_atual.map((v) => +v.toFixed(2)),
        );

        // salvar metadados ocultos (se quiser estender)
        window._lastCalc = {
          texto_resultado,
          pico_total,
          hora_pico,
          demTOT,
          criarMedidas,
          kva_selecionados,
          limite,
          lim_Municipio,
        };
      }

      /* util escape HTML */
      function escapeHtml(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
